<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScentCare Price List</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main: #00b894; --price: #d63031; --bg: #f9f9f9; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #2d3436; }
        .header { background: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top:0; z-index:10; }
        .search-area { padding: 15px; background: white; }
        #searchBox { width: 100%; padding: 12px 15px; border-radius: 25px; border: 1px solid #dfe6e9; box-sizing: border-box; font-size: 16px; outline: none; }
        .section-label { padding: 10px 15px; font-weight: 600; color: #636e72; background: #f1f2f6; font-size: 0.85rem; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #f1f2f6; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; margin: 0; font-size: 1.05rem; }
        .item-sub { font-size: 0.75rem; color: #b2bec3; margin: 3px 0; }
        .p-old { text-decoration: line-through; color: #b2bec3; font-size: 0.8rem; display: block; }
        .p-new { color: var(--price); font-weight: 600; font-size: 1.2rem; }
        .send-btn { margin-top: 10px; background: #e8f8f5; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; color: var(--main); font-weight: 600; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 5px 0; }
        .nav-btn { flex: 1; text-align: center; padding: 8px; color: #b2bec3; text-decoration: none; cursor: pointer; }
        .nav-btn.active { color: var(--main); }
        .nav-btn i { display: block; font-size: 1.4rem; }
    </style>
</head>
<body>
<div class="header"><b>ScentCare Sales Tool</b></div>
<div class="search-area"><input type="text" id="searchBox" placeholder="🔍 ค้นหารุ่นสินค้าหรือกลิ่น..."></div>
<div id="content"></div>
<div class="nav">
    <div class="nav-btn active" onclick="showCat('all', this)"><i class="bi bi-grid"></i><span>ทั้งหมด</span></div>
    <div class="nav-btn" onclick="showCat('Machine', this)"><i class="bi bi-gear"></i><span>เครื่องหอม</span></div>
    <div class="nav-btn" onclick="showCat('Fragrance', this)"><i class="bi bi-droplet"></i><span>น้ำหอม</span></div>
</div>
<script>
    // ข้อมูลสินค้าจากไฟล์ที่คุณให้มา
    const products = [
        { cat: 'Machine', group: 'เครื่องหอม', name: 'PIEXO', detail: 'พร้อมน้ำหอม 120 ml. & ถ่าน 4 ก้อน', std: '3,750', promo: '2,590' },
        { cat: 'Machine', group: 'เครื่องหอม', name: 'KODO VASE LUX', detail: 'พร้อมน้ำหอม 15 ml. & Alcohol 15 ml.', std: '3,200', promo: '2,490' },
        { cat: 'Machine', group: 'เครื่องหอม', name: 'KODO RADAR X', detail: 'พร้อมน้ำหอม 50 ml.', std: '5,200', promo: '4,390' },
        { cat: 'Fragrance', group: 'น้ำหอม: Standard', name: 'น้ำหอม 100 ml.', detail: 'Standard Line', std: '1,600', promo: '1,300' },
        { cat: 'Fragrance', group: 'น้ำหอม: Premium', name: 'น้ำหอม 100 ml.', detail: 'Premium Line', std: '1,800', promo: '1,500' }
    ];

    async function initLiff() {
        // *** สำคัญ: นำ LIFF ID จากขั้นตอนที่ 4 มาใส่ที่นี่ ***
        await liff.init({ liffId: "ใส่_LIFF_ID_ของคุณตรงนี้" }); 
        if (!liff.isLoggedIn()) liff.login();
        renderList(products);
    }
    initLiff();

    function renderList(items) {
        const container = document.getElementById('content');
        container.innerHTML = '';
        let lastGroup = '';
        items.forEach(p => {
            if (p.group !== lastGroup) {
                const label = document.createElement('div');
                label.className = 'section-label';
                label.innerText = p.group;
                container.appendChild(label);
                lastGroup = p.group;
            }
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item';
            itemDiv.innerHTML = `
                <div class="item-info">
                    <p class="item-name">${p.name}</p>
                    <p class="item-sub">${p.detail}</p>
                    <button class="send-btn" onclick="sendToChat('${p.name}', '${p.promo}')">ส่งราคาเข้าแชท</button>
                </div>
                <div class="item-price">
                    <span class="p-old">฿${p.std}</span>
                    <span class="p-new">฿${p.promo}</span>
                </div>`;
            container.appendChild(itemDiv);
        });
    }

    function sendToChat(name, price) {
        liff.sendMessages([{ 'type': 'text', 'text': "📢 รายละเอียดสินค้า\\n" + name + "\\n💰 ราคาพิเศษ: " + price + " บาท" }])
            .then(() => liff.closeWindow());
    }

    function showCat(cat, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
        renderList(filtered);
    }
</script>
</body>
</html>
