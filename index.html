    <style>
        :root { --main: #00b894; --price: #d63031; --bg: #f9f9f9; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #2d3436; }
        .header { background: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top:0; z-index:10; }
        .search-area { padding: 15px; background: white; }
        #searchBox { width: 100%; padding: 12px 15px; border-radius: 25px; border: 1px solid #dfe6e9; box-sizing: border-box; font-size: 16px; outline: none; }
        .section-label { padding: 10px 15px; font-weight: 600; color: #636e72; background: #f1f2f6; font-size: 0.85rem; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #f1f2f6; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; margin: 0; font-size: 1rem; color: #2d3436; }
        .item-sub { font-size: 0.75rem; color: #b2bec3; margin: 3px 0; line-height: 1.2; }
        .item-price { text-align: right; margin-left: 10px; }
        .p-old { text-decoration: line-through; color: #b2bec3; font-size: 0.8rem; display: block; }
        .p-new { color: var(--price); font-weight: 600; font-size: 1.15rem; }
        .send-btn { margin-top: 10px; background: #e8f8f5; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; color: var(--main); font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 5px 0; }
        .nav-btn { flex: 1; text-align: center; padding: 8px; color: #b2bec3; text-decoration: none; cursor: pointer; }
        .nav-btn.active { color: var(--main); }
        .nav-btn i { display: block; font-size: 1.4rem; }
        .nav-btn span { font-size: 0.7rem; }
    </style>
</head>

    ];

    async function initLiff() {
        // ใส่ LIFF ID เรียบร้อยแล้ว
        await liff.init({ liffId: "2009213220-wDKQcHXY" }); 
        if (!liff.isLoggedIn()) liff.login();
        renderList(products);
    }
    initLiff();

    function renderList(items) {
        const container = document.getElementById('content');
        container.innerHTML = '';
        let lastGroup = '';
        items.forEach(p => {
            if (p.group !== lastGroup) {
                const label = document.createElement('div');
                label.className = 'section-label';
                label.innerText = p.group;
                container.appendChild(label);
                lastGroup = p.group;
            }
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item';
            const finalP = p.promo !== '-' ? p.promo : p.std;
            itemDiv.innerHTML = `
                <div class="item-info">
                    <p class="item-name">${p.name}</p>
                    <p class="item-sub">${p.detail}</p>
                    <button class="send-btn" onclick="sendToChat('${p.name}', '${finalP}')"><i class="bi bi-send-fill"></i> ส่งราคาเข้าแชท</button>
                </div>
                <div class="item-price">
                    <span class="p-old">${(p.promo !== '-' && p.promo !== p.std) ? '฿'+p.std : ''}</span>
                    <span class="p-new">฿${finalP}</span>
                </div>`;
            container.appendChild(itemDiv);
        });
    }

    function sendToChat(name, price) {
        if (!liff.isInClient()) {
            alert("ก๊อปปี้เรียบร้อย: " + name + " ราคา " + price + " บาท (เปิดใน LINE เพื่อส่งเข้าแชททันที)");
            return;
        }
        liff.sendMessages([{ 'type': 'text', 'text': "📢 รายละเอียดสินค้า\\n" + name + "\\n💰 ราคาพิเศษ: " + price + " บาท" }])
            .then(() => liff.closeWindow()).catch(err => console.error(err));
    }

    function showCat(cat, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
        renderList(filtered);
    }

    document.getElementById('searchBox').addEventListener('input', function() {
        const val = this.value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(val) || p.group.toLowerCase().includes(val));
        renderList(filtered);
    });
</script>
</body>
</html>
